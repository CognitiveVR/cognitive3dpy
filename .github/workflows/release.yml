name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write  # needed to push version bump commit and create release

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the version-bump commit itself to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to determine version bump
          token: ${{ secrets.PSR_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python-semantic-release
        run: pip install python-semantic-release>=9.0.0

      - name: Bump version and tag
        run: semantic-release version
        env:
          GH_TOKEN: ${{ secrets.PSR_TOKEN }}

      - name: Create GitHub Release
        run: semantic-release publish
        env:
          GH_TOKEN: ${{ secrets.PSR_TOKEN }}

      - name: Publish to PyPI
        run: |
          pip install 'uv==0.4.20'
          uv build
          uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
