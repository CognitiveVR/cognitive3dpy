name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ --cov=src/cognitive3dpy --cov-report=term-missing --cov-fail-under=50

  schema-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.SLICER_READ_TOKEN }}

      - name: Checkout cvr-cortex
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: CognitiveVR/cvr-cortex
          token: ${{ secrets.SLICER_READ_TOKEN }}
          path: cvr-cortex
          sparse-checkout: doc/slicer_fields.yaml
          sparse-checkout-cone-mode: false

      - name: Checkout cvr-slicer (fallback)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: CognitiveVR/cvr-slicer
          token: ${{ secrets.SLICER_READ_TOKEN }}
          path: cvr-slicer
          sparse-checkout: doc/slicer_fields.yaml
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sync schema
        run: |
          if [ -f cvr-cortex/doc/slicer_fields.yaml ]; then
            YAML_PATH=cvr-cortex/doc/slicer_fields.yaml
          elif [ -f cvr-slicer/doc/slicer_fields.yaml ]; then
            YAML_PATH=cvr-slicer/doc/slicer_fields.yaml
          else
            echo "::warning::slicer_fields.yaml not found in either repo — skipping schema sync"
            exit 0
          fi

          python scripts/sync_schema.py "$YAML_PATH"
          if git diff --exit-code src/cognitive3dpy/_schema_generated.py; then
            echo "Schema is up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/cognitive3dpy/_schema_generated.py
            git commit -m "chore: auto-sync schema from slicer_fields.yaml [skip ci]"
            git push
            echo "::notice::Schema was out of date — auto-committed update."
          fi
